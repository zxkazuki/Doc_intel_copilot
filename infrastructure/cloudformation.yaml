AWSTemplateFormatVersion: '2010-09-09'
Description: Doc Intel Copilot - Demo stack (EC2 Ubuntu + S3 + DynamoDB + Bedrock)

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair for EC2 access

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]

  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-6

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  IGW:
    Type: AWS::EC2::InternetGateway

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  SubnetRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and Streamlit
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8501
          ToPort: 8501
          CidrIp: 0.0.0.0/0

  DocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub doc-intel-copilot-docs-${AWS::AccountId}

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: doc-intel-documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: uploaded_at
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: uploaded_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: category-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: uploaded_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ExtractionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: doc-intel-extractions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH

  InsightsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: doc-intel-insights
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: insight_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: severity
          AttributeType: S
      KeySchema:
        - AttributeName: insight_id
          KeyType: HASH
        - AttributeName: document_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: document-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
            - AttributeName: severity
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ReviewsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: doc-intel-reviews
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: review_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: review_id
          KeyType: HASH
        - AttributeName: document_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: document-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: doc-intel-copilot-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DocIntelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject, s3:DeleteObject]
                Resource: !Sub ${DocsBucket.Arn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt DocsBucket.Arn
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:GetItem, dynamodb:UpdateItem, dynamodb:Query, dynamodb:Scan]
                Resource:
                  - !GetAtt DocumentsTable.Arn
                  - !Sub ${DocumentsTable.Arn}/index/*
                  - !GetAtt ExtractionsTable.Arn
                  - !GetAtt InsightsTable.Arn
                  - !Sub ${InsightsTable.Arn}/index/*
                  - !GetAtt ReviewsTable.Arn
                  - !Sub ${ReviewsTable.Arn}/index/*
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      ImageId: ami-0f9de6e2d2f067fca
      SubnetId: !Ref Subnet
      SecurityGroupIds: [!Ref SG]
      Tags:
        - Key: Name
          Value: doc-intel-copilot
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          apt-get update -y
          apt-get install -y python3.11 python3.11-venv python3-pip git

          cd /home/ubuntu
          git clone https://github.com/zxkazuki/Doc_intel_copilot.git app
          cd app

          python3.11 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

          cat > .env << 'EOF'
          AWS_REGION=${AWS::Region}
          S3_BUCKET_NAME=${DocsBucket}
          DYNAMODB_DOCUMENTS_TABLE=doc-intel-documents
          DYNAMODB_EXTRACTIONS_TABLE=doc-intel-extractions
          DYNAMODB_INSIGHTS_TABLE=doc-intel-insights
          DYNAMODB_REVIEWS_TABLE=doc-intel-reviews
          BEDROCK_MODEL_ID=${BedrockModelId}
          MAX_FILE_SIZE_MB=20
          EOF

          cat > /etc/systemd/system/streamlit.service << 'UNIT'
          [Unit]
          Description=Streamlit Doc Intel Copilot
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/app
          ExecStart=/home/ubuntu/app/.venv/bin/streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
          Restart=always

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable streamlit
          systemctl start streamlit

Outputs:
  AppURL:
    Description: Streamlit application URL
    Value: !Sub http://${EC2Instance.PublicIp}:8501

  EC2PublicIP:
    Description: EC2 public IP
    Value: !GetAtt EC2Instance.PublicIp

  S3Bucket:
    Description: S3 bucket for documents
    Value: !Ref DocsBucket

  SSHCommand:
    Description: SSH command
    Value: !Sub ssh -i ${KeyPairName}.pem ubuntu@${EC2Instance.PublicIp}
